name: Release

# Builds the .app bundle on macOS GitHub runners (one job per arch),
# ad-hoc signs, tarballs, and uploads to the GitHub Release page.
# install.sh's fast path then downloads the pre-built bundle by arch
# instead of the user spending ~5 min building locally.
#
# Triggered by:
#   • Tag push (vX.Y.Z) — produces the actual release artifacts
#   • workflow_dispatch — manual trigger for testing the build pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to upload to releases

jobs:
  build:
    # Apple Silicon only. Intel was dropped because:
    #   • macOS Tahoe (26.x) is arm64-only — we can't run our own bundle
    #     on Intel macOS to verify any of it works
    #   • Apple stopped selling Intel Macs in 2023
    #   • macOS Sequoia (15.x) is the last Intel-supported release
    #   • Shipping a binary we can't smoke-test is a maintenance burden
    #     for an audience that's shrinking fast in 2026
    # If demand reappears, re-add `macos-13` to a matrix block here.
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      ARCH: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Confirm runner arch
        run: |
          echo "Runner uname -m: $(uname -m)"
          echo "Expected: ${{ env.ARCH }}"
          test "$(uname -m)" = "${{ env.ARCH }}" \
            || { echo "Mismatch — runner arch != expected"; exit 1; }

      - name: Install Python dependencies
        run: |
          PIP="python3 -m pip install --user --break-system-packages"
          $PIP \
            'websockets>=13.0' \
            'numpy>=1.24' \
            'Pillow>=10.0' \
            'cryptography>=41.0'
          # av (PyAV) is best-effort — server falls back to JPEG without it.
          $PIP 'av>=12.0' || echo "av not available, JPEG fallback only"
          $PIP \
            pyobjc-core \
            pyobjc-framework-Cocoa \
            pyobjc-framework-Quartz \
            pyobjc-framework-AVFoundation \
            pyobjc-framework-ScreenCaptureKit
          $PIP 'py2app>=0.28' setuptools

      - name: Build .app bundle
        run: |
          rm -rf build dist
          python3 build_app.py py2app 2>&1 | tail -20
          test -d "dist/mac-vnc-stream.app" || { echo "py2app produced no .app"; exit 1; }
          ls -la dist/mac-vnc-stream.app

      - name: Ad-hoc sign
        run: |
          # Ad-hoc signature gives the bundle a stable CDHash that TCC can
          # track — necessary for grant persistence across runs. NOT --options
          # runtime: hardened runtime conflicts with mixed Apple+adhoc dylib
          # signatures (see project memory: macscreencast .app bundle plan).
          codesign --force --deep --sign - dist/mac-vnc-stream.app
          codesign -dvv dist/mac-vnc-stream.app 2>&1 | grep -E "Identifier|Authority|TeamIdentifier|Signature|Format"

      - name: Smoke test the bundle
        run: |
          # Confirm the bundle binary at least starts and responds to --help.
          # Doesn't validate SCK or TCC (those need user interaction); just
          # catches obvious dyld / py2app bundling regressions before publish.
          dist/mac-vnc-stream.app/Contents/MacOS/mac-vnc-stream --help \
            | head -5

      - name: Package
        id: package
        run: |
          ARTIFACT="mac-vnc-stream-${{ env.ARCH }}.app.tar.gz"
          # gzip-compressed tar so install.sh can pipe through tar -xzf.
          # -C dist/ + bare relative path keeps the archive's top-level
          # entry as `mac-vnc-stream.app/...` (extracts cleanly into
          # /Applications/ via `sudo tar -xzf $TAR -C /Applications/`).
          tar -czf "$ARTIFACT" -C dist mac-vnc-stream.app
          shasum -a 256 "$ARTIFACT" | tee "${ARTIFACT}.sha256"
          ls -la "$ARTIFACT" "${ARTIFACT}.sha256"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-vnc-stream-${{ env.ARCH }}
          path: |
            mac-vnc-stream-${{ env.ARCH }}.app.tar.gz
            mac-vnc-stream-${{ env.ARCH }}.app.tar.gz.sha256

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-vnc-stream-${{ env.ARCH }}.app.tar.gz
            mac-vnc-stream-${{ env.ARCH }}.app.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
